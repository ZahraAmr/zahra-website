<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-98FTN68HNC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-98FTN68HNC');
  </script>

  <title>Zahra Website</title>
</head>
  <title>Zahra Website</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #e4ecfb);
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 48px 32px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #eef3ff;
      color: #3b5bcc;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 16px;
      color: #111827;
    }

    p {
      font-size: 18px;
      line-height: 1.7;
      color: #4b5563;
      max-width: 560px;
      margin: 0 auto 32px;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn {
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      transition: 0.25s ease;
      display: inline-block;
      min-width: 170px;
    }

    .twitter {
      background: #1d9bf0;
      color: white;
    }

    .twitter:hover {
      background: #0d8ae8;
      transform: translateY(-2px);
    }

    .whatsapp {
      background: #25d366;
      color: white;
    }

    .whatsapp:hover {
      background: #1ebe5a;
      transform: translateY(-2px);
    }

    footer {
      margin-top: 36px;
      font-size: 14px;
      color: #6b7280;
    }

    @media (max-width: 600px) {
      .card {
        padding: 36px 22px;
      }

      h1 {
        font-size: 32px;
      }

      p {
        font-size: 16px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Welcome to My Website</div>

    <h1>Hello, I’m Zahra 👋</h1>

    <p>
      Welcome to my personal website. This is a simple practice page built with
      HTML and CSS. You can use it to test Google Analytics, button clicks,
      and visitor activity.
    </p>

    <div class="button-group">
      <a
        class="btn twitter"
        href="https://twitter.com/intent/tweet?text=Welcome%20to%20Zahra%27s%20website!"
        target="_blank"
        rel="noopener noreferrer"
      >
        Share on Twitter
      </a>

      <a
        class="btn whatsapp"
        href="https://wa.me/?text=Welcome%20to%20Zahra%27s%20website!"
        target="_blank"
        rel="noopener noreferrer"
      >
        Share on WhatsApp
      </a>
    </div>

    <footer>
      Built by Zahra for HTML and GA4 practice
    </footer>
  </main>
</body>
</html>
